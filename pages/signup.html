<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Project Board - Sign up for your project management dashboard. Organize, track, and collaborate on your projects seamlessly.">
    <title>Project Board — Sign Up</title>
    <link rel="icon" href="../logo.png" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 3D Animated Background -->
    <div class="bg-scene" id="bgScene">
        <div class="bg-layer bg-layer--deep">
            <img src="background_video.gif" class="bg-video" alt="Background Loop">
        </div>
        <div class="bg-layer bg-layer--mid">
            <div class="texture-overlay"></div>
        </div>
        <div class="bg-layer bg-layer--front">
            <div class="particle-field" id="particleField"></div>
        </div>
        <!-- Dark gradient overlay for readability -->
        <div class="bg-gradient-overlay"></div>
    </div>

    <!-- Main Container -->
    <div class="login-container">

        <!-- Left Side — Spacer (transparent to show background video) -->
        <div class="branding-side"></div>

        <!-- Right Side — Login Form Panel (Full Height, Blurred Glass) -->
        <div class="form-side">
            <div class="form-side-content">
                <!-- Branding Header inside the right panel -->
                <div class="branding-content">

                    <div class="brand-text-group">
                        <h1 class="brand-title">
                            <span class="brand-word brand-word--project">Project </span>
                            <span class="brand-word brand-word--board">Board</span>
                        </h1>
                        <p class="brand-tagline">Organize. Track. Collaborate.</p>
                    </div>
                </div>

                <!-- Form Header -->
                <div class="form-header">
                    <h2 class="form-title">Create Account</h2>
                    <p class="form-subtitle">Join Project Board today</p>
                </div>

                <form class="login-form" id="signupForm" autocomplete="off">
                    <!-- Full Name Field -->
                    <div class="input-group" id="nameGroup">
                        <label for="fullName" class="input-label">Full Name</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="fullName" name="fullName"
                                placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="input-group" id="emailGroup">
                        <label for="loginId" class="input-label">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <rect x="3" y="5" width="18" height="14" rx="2" ry="2" />
                                <polyline points="3 7 12 13 21 7" />
                            </svg>
                            <input type="email" id="loginId" name="loginId"
                                placeholder="Enter your email" required>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="input-group" id="passwordGroup">
                        <label for="password" class="input-label">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                            <input type="password" id="password" name="password" placeholder="Create a password"
                                required>
                        </div>
                    </div>

                    <!-- Sign Up Button -->
                    <button type="submit" class="login-btn" id="loginBtn" style="margin-top: 10px;">
                        <span class="btn-text">Sign Up</span>
                        <span class="btn-loader" id="btnLoader">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10" />
                            </svg>
                        </span>
                        <span class="btn-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12" />
                                <polyline points="12 5 19 12 12 19" />
                            </svg>
                        </span>
                        <div class="btn-ripple"></div>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">or</span>
                    <span class="divider-line"></span>
                </div>

                <!-- Sign In -->
                <div class="form-footer">
                    <p class="footer-text">Already have an account?</p>
                    <a href="login.html" class="register-btn" id="registerBtn">
                        <span>Login Now</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                            height="16">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            <polyline points="12 5 19 12 12 19" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
